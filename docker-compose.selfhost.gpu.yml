# Managed compose template for installer-based Zukan self-hosting with NVIDIA GPU support.
# The in-app updater refreshes this file from the latest GitHub release.

services:
  frontend:
    image: ghcr.io/starsbit/zukan-frontend:latest
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    image: ghcr.io/starsbit/zukan-api:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://zukan:${POSTGRES_PASSWORD}@db:5432/zukan
      SECRET_KEY: ${SECRET_KEY}
      UPDATER_URL: http://updater:8080
      UPDATER_TOKEN: ${UPDATER_TOKEN}
      LOG_LEVEL: INFO
    volumes:
      - storage_data:/backend/storage
      - model_cache:/backend/model_cache
    depends_on:
      db:
        condition: service_healthy
      updater:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: zukan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zukan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zukan"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  updater:
    image: docker:29.4.0-cli
    command:
      - sh
      - -c
      - |
        cp /scripts/serve-update.sh /tmp/serve-update.sh
        chmod 755 /tmp/serve-update.sh
        exec nc -lk -p 8080 -e /tmp/serve-update.sh
    environment:
      UPDATER_TOKEN: ${UPDATER_TOKEN}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-zukan}
      ZUKAN_COMPOSE_FILE: /work/docker-compose.yml
      ZUKAN_COMPOSE_TEMPLATE: docker-compose.selfhost.gpu.yml
      ZUKAN_REPO: ${ZUKAN_REPO:-starsbit/zukan}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/work
      - ./updater:/scripts:ro
    restart: unless-stopped

volumes:
  postgres_data:
  storage_data:
  model_cache:
