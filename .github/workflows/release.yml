name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zukan
          POSTGRES_PASSWORD: zukan
          POSTGRES_DB: zukan
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zukan"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run tests
        run: pytest backend/tests
        env:
          DATABASE_URL: postgresql+asyncpg://zukan:zukan@localhost:5432/zukan

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Restore model cache
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/zukan_model_cache
          key: zukan-model-cache-wd-vit-tagger-v3

      - name: Populate model cache Docker volume
        run: |
          docker volume create zukan_model_cache
          if [ -d ~/.cache/zukan_model_cache ] && [ "$(ls -A ~/.cache/zukan_model_cache 2>/dev/null)" ]; then
            docker run --rm \
              -v zukan_model_cache:/target \
              -v ~/.cache/zukan_model_cache:/source:ro \
              alpine sh -c "cp -a /source/. /target/"
          fi

      - name: Run e2e tests
        run: bash e2e.sh

      - name: Save model cache
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/zukan_model_cache
          docker run --rm \
            -v zukan_model_cache:/source:ro \
            -v ~/.cache/zukan_model_cache:/target \
            alpine sh -c "cp -a /source/. /target/"

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/zukan-api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/zukan-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zukan-frontend:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/zukan-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
