<section class="selection-toolbar-shell" [attr.aria-label]="ariaLabel">
  <div class="selection-toolbar-start">
    <button
      mat-icon-button
      type="button"
      [attr.aria-label]="clearButtonAriaLabel"
      (click)="clearRequested.emit()"
    >
      <mat-icon>close</mat-icon>
    </button>
    <p>{{ selectedCount }} selected</p>
  </div>

  <div class="selection-toolbar-actions">
    <ng-content select="[selectionToolbarActions]"></ng-content>
  </div>
</section>
