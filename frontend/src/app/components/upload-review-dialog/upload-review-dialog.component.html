<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content class="upload-review-dialog">
  <section class="upload-review-warning" aria-label="Upload review warning">
    <mat-icon>warning_amber</mat-icon>
    <p>{{ warningText }}</p>
  </section>

  <div class="upload-review-layout">
    <mat-card class="upload-review-preview" appearance="outlined">
      <mat-card-content>
        @if (loading) {
          <div class="upload-review-state">
            <mat-spinner diameter="36"></mat-spinner>
            <p>Loading image preview...</p>
          </div>
        } @else if (failed) {
          <div class="upload-review-state">
            <mat-icon>broken_image</mat-icon>
            <p>We could not load this preview.</p>
          </div>
        } @else if (mediaUrl) {
          <img [src]="mediaUrl" [alt]="data.media.original_filename || data.media.filename" />
        }
      </mat-card-content>
    </mat-card>

    <section class="upload-review-form">
      <p class="upload-review-filename">{{ data.media.original_filename || data.media.filename }}</p>
      <app-media-tag-editor
        [characterName]="draft.characterName"
        [tags]="data.media.tags"
        (draftChange)="updateDraft($event)"
      />
    </section>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="skip()">Skip</button>
  <button mat-button type="button" (click)="skipAll()">Skip all</button>
  <button mat-flat-button color="primary" type="button" (click)="save()">Save</button>
</mat-dialog-actions>
