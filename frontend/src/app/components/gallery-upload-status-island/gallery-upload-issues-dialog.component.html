<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <div class="issues-grid">
    @for (item of data.items; track item.fileName) {
      <article class="issue-row">
        <div class="thumb-wrap" aria-hidden="true">
          @if (item.previewUrl) {
            <img [src]="item.previewUrl" [alt]="item.fileName" />
          } @else {
            <mat-icon>broken_image</mat-icon>
          }
        </div>
        <div class="issue-copy">
          <p class="issue-name">{{ item.fileName }}</p>
          <p class="issue-message">{{ issueRowMessage(item) }}</p>
        </div>
      </article>
    }
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">Close</button>
</mat-dialog-actions>
