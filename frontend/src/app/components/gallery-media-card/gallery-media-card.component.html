<button
  class="media-card"
  type="button"
  [style.aspect-ratio]="aspectRatio"
  [attr.aria-label]="'Open ' + (media.original_filename || media.filename)"
  (click)="openMedia()"
>
  @if (thumbnailUrl) {
    <img
      class="media-thumb"
      [src]="thumbnailUrl"
      [alt]="media.original_filename || media.filename"
      loading="lazy"
    >
  } @else {
    <div class="media-fallback">
      @if (loadingThumbnail) {
        <mat-spinner diameter="28"></mat-spinner>
      } @else {
        <mat-icon>{{ media.media_type === 'video' ? 'videocam' : 'image' }}</mat-icon>
      }
    </div>
  }

  @if (showStatusBadge) {
    <span class="media-badge status-badge">
      <mat-spinner diameter="14" strokeWidth="3"></mat-spinner>
      <span>{{ statusBadgeLabel }}</span>
    </span>
  }

  @if (media.is_nsfw) {
    <span class="media-badge nsfw-badge">NSFW</span>
  }

  <div class="media-meta">
    <p>{{ media.original_filename || media.filename }}</p>
    <span>{{ media.metadata.captured_at | date:'mediumDate' }}</span>
  </div>
</button>
