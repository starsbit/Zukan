<aside class="gallery-sidebar" aria-label="App navigation">
  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>Zukan</mat-card-title>
    </mat-card-header>

    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/gallery"
        routerLinkActive="mdc-list-item--activated"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon matListItemIcon>photo_library</mat-icon>
        <span matListItemTitle>Gallery</span>
      </a>

      <a
        mat-list-item
        routerLink="/albums"
        routerLinkActive="mdc-list-item--activated"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        <mat-icon matListItemIcon>collections_bookmark</mat-icon>
        <span matListItemTitle>Albums</span>
      </a>

      <a
        mat-list-item
        routerLink="/gallery/trash"
        routerLinkActive="mdc-list-item--activated"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon matListItemIcon>delete</mat-icon>
        <span matListItemTitle>Trash</span>
      </a>
    </mat-nav-list>
  </mat-card>
</aside>
