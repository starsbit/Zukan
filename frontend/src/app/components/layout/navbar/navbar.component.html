<mat-toolbar class="navbar-shell">
  @if (showMenuToggle()) {
    <button
      mat-icon-button
      type="button"
      class="navbar-menu-toggle"
      aria-label="Open navigation menu"
      (click)="onMenuToggle()"
    >
      <mat-icon>menu</mat-icon>
    </button>
  }
  @if (!showMenuToggle()) {
    <zukan-navbar-brand></zukan-navbar-brand>
  }
  <zukan-navbar-search class="navbar-search"></zukan-navbar-search>
  <zukan-navbar-actions></zukan-navbar-actions>
</mat-toolbar>
