<h2 mat-dialog-title>Account Settings</h2>

<mat-dialog-content>
  <form class="settings-form" [formGroup]="form">
    <mat-form-field>
      <mat-label>Username</mat-label>
      <input matInput [value]="currentUser?.username ?? ''" disabled />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Email</mat-label>
      <input matInput [value]="currentUser?.email ?? ''" disabled />
    </mat-form-field>

    <mat-checkbox formControlName="showNsfw">Show NSFW content</mat-checkbox>

    <mat-form-field>
      <mat-label>Tag Confidence Threshold</mat-label>
      <input
        matInput
        type="number"
        min="0"
        max="1"
        step="0.01"
        formControlName="tagConfidenceThreshold"
      />
    </mat-form-field>

    <mat-form-field>
      <mat-label>New Password</mat-label>
      <input matInput type="password" formControlName="password" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Confirm Password</mat-label>
      <input matInput type="password" formControlName="confirmPassword" />
    </mat-form-field>

    @if (error()) {
      <div class="form-error">{{ error() }}</div>
    }
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">Cancel</button>
  <button mat-flat-button type="button" (click)="save()" [disabled]="loading()">
    @if (loading()) {
      <mat-progress-spinner mode="indeterminate" diameter="18"></mat-progress-spinner>
    } @else {
      <span>Save</span>
    }
  </button>
</mat-dialog-actions>
