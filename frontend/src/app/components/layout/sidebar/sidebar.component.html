<section class="sidebar-shell">
  @for (section of navigationSections; track section.label) {
    <div class="sidebar-section">
      <p class="section-title">{{ section.label }}</p>

      <mat-nav-list>
        @for (item of section.items; track item.path) {
          <a
            mat-list-item
            class="sidebar-link"
            [routerLink]="item.path"
            routerLinkActive
            #activeLink="routerLinkActive"
            [activated]="activeLink.isActive"
            [routerLinkActiveOptions]="{ exact: item.path === '/gallery' }"
          >
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
            <span matListItemTitle>{{ item.label }}</span>
          </a>
        }
      </mat-nav-list>
    </div>
  }

  <div class="spacer"></div>

  @if (currentUser(); as user) {
    <div class="storage-footer">
      <div class="storage-bar-track">
        <div class="storage-bar-fill" [style.width.%]="storagePercent(user)"></div>
      </div>
      <span class="storage-label">{{ formatMb(user.storage_used_mb) }} / {{ formatMb(user.storage_quota_mb) }}</span>
    </div>
  }
</section>
