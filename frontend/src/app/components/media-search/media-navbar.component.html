<mat-toolbar class="media-navbar">
  <div class="navbar-search">
    <app-media-search-bar
      [searchText]="searchState.searchText"
      [activeFilterCount]="activeFilterCount"
      (searchSubmitted)="applySearch($event)"
      (filtersRequested)="openFilters()"
      (cleared)="clearSearch()"
    />
  </div>

  <div class="navbar-actions">
    @if (showPrimaryAction && isTrashView) {
      <button mat-stroked-button type="button" class="trash-action-button" aria-label="Empty trash" (click)="emptyTrashRequested.emit()">
        <mat-icon>delete_sweep</mat-icon>
        <span>Empty Trash</span>
      </button>
    } @else if (showPrimaryAction) {
      <button
        [matMenuTriggerFor]="uploadMenu"
        mat-flat-button
        type="button"
        class="upload-button"
        aria-label="Upload media files or folder"
      >
        <mat-icon>cloud_upload</mat-icon>
        <span class="upload-label">Upload</span>
      </button>
      <mat-menu #uploadMenu="matMenu">
        <button mat-menu-item type="button" (click)="uploadFilesRequested.emit()">
          <mat-icon>attach_file</mat-icon>
          <span>Upload files</span>
        </button>
        <button mat-menu-item type="button" (click)="uploadFolderRequested.emit()">
          <mat-icon>folder</mat-icon>
          <span>Upload folder</span>
        </button>
      </mat-menu>
    }

    <button
      mat-icon-button
      type="button"
      class="theme-toggle-button"
      [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      [attr.aria-pressed]="themeService.isDarkMode()"
      (click)="toggleTheme()"
    >
      <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <button mat-icon-button type="button" aria-label="Open settings" (click)="openSettings()">
      <mat-icon>settings</mat-icon>
    </button>
  </div>
</mat-toolbar>
