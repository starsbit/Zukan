<a class="album-card-link" [routerLink]="['/albums', album.id]">
  <mat-card class="album-card" appearance="outlined">
    <div class="album-card-cover">
      @if (showMosaicCover) {
        <div class="album-card-mosaic" aria-hidden="true">
          @for (coverUrl of coverUrls; track coverUrl) {
            <img [src]="coverUrl" alt="">
          }
        </div>
      } @else if (primaryCoverUrl) {
        <img [src]="primaryCoverUrl" [alt]="album.name">
      } @else {
        <div class="album-card-fallback">
          <mat-icon>collections</mat-icon>
        </div>
      }
    </div>

    <mat-card-content>
      <h2>{{ album.name }}</h2>
      @if (album.description) {
        <p class="album-card-description">{{ album.description }}</p>
      }
      <p>{{ album.media_count ?? 0 }} {{ (album.media_count ?? 0) === 1 ? 'item' : 'items' }}</p>
    </mat-card-content>
  </mat-card>
</a>
