@if (hasEntries()) {
  <aside class="media-timeline" aria-label="Gallery timeline">
    @if (hoveredLabel(); as label) {
      <div
        class="media-timeline__chip"
        [style.top.%]="indicatorProgress() ?? 0">
        {{ label }}
      </div>
    }

    <div class="media-timeline__years">
      @for (item of visibleEntries(); track item.entry.year) {
        <button
          class="media-timeline__year"
          [class.media-timeline__year--label]="item.showLabel"
          [class.media-timeline__year--dot]="!item.showLabel"
          [class.media-timeline__year--active]="activeYear() === item.entry.year"
          [style.top.%]="yearPosition(item.entry)"
          type="button"
          (click)="jumpToYear(item.entry)">
          @if (item.showLabel) {
            {{ item.entry.year }}
          }
        </button>
      }
    </div>

    <div
      class="media-timeline__rail"
      #rail
      role="scrollbar"
      aria-label="Timeline scrubber"
      aria-valuemin="0"
      aria-valuemax="100"
      [attr.aria-valuenow]="indicatorProgress() ?? 0"
      (pointerdown)="onRailPointerDown($event)"
      (pointermove)="onRailPointerMove($event)"
      (pointerup)="onRailPointerUp($event)"
      (pointercancel)="onRailPointerUp($event)"
      (pointerenter)="onRailPointerEnter($event)"
      (pointerleave)="onRailPointerLeave()">

      @for (month of flatMonths(); track monthKey(month.year, month.month)) {
        <button
          class="media-timeline__month"
          type="button"
          [style.top.%]="monthPosition(month)"
          [class.media-timeline__month--active]="activeMonthKey() === monthKey(month.year, month.month)"
          [class.media-timeline__month--rendered]="month.rendered"
          [attr.aria-label]="monthLabel(month.month) + ' ' + month.year"
          [title]="monthLabel(month.month) + ' ' + month.year"
          (click)="jumpToMonth(month.year, month.month)">
        </button>
      }

      @if (indicatorProgress() !== null) {
        <div
          class="media-timeline__indicator"
          [style.top.%]="indicatorProgress()">
        </div>
      }
    </div>
  </aside>
}
