<section
  class="gallery-groups"
  [class.gallery-groups-regrouping]="regroupAnimating"
  [attr.aria-label]="ariaLabel"
>
  @for (group of groups; track group.key) {
    <section class="gallery-group" [attr.data-gallery-group-key]="group.key" [attr.aria-labelledby]="'gallery-group-' + group.key">
      <header class="gallery-group-header">
        <h2 class="gallery-group-title" [id]="'gallery-group-' + group.key">{{ group.label }}</h2>
        <button
          mat-button
          type="button"
          class="gallery-group-select"
          [attr.aria-pressed]="isGroupSelected(group)"
          (click)="groupSelected.emit(group)"
        >
          <mat-icon>{{ isGroupSelected(group) ? 'check_circle' : 'radio_button_unchecked' }}</mat-icon>
          <span>Select all</span>
        </button>
      </header>

      <section class="gallery-grid" [class.gallery-grid-single]="group.items.length === 1">
        @for (item of group.items; track item.id) {
          <app-gallery-media-card
            [media]="item"
            [selectionMode]="selectionMode"
            [selected]="selectedIds.has(item.id)"
            [trashMode]="trashMode"
            (open)="mediaOpened.emit($event)"
            (selectionToggled)="mediaSelectionToggled.emit($event)"
            (restoreRequested)="mediaRestoreRequested.emit($event)"
          />
        }
      </section>
    </section>
  }
</section>
