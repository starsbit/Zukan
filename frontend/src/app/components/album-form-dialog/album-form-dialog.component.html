<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content class="album-dialog-content">
  <form class="album-dialog-form" [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" class="album-name-field">
      <mat-label>Album name</mat-label>
      <input matInput formControlName="name" maxlength="255" cdkFocusInitial>
      @if (form.controls.name.invalid && form.controls.name.touched) {
        <mat-error>Album name is required.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="album-description-field">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3" maxlength="1000"></textarea>
      <mat-hint align="end">{{ form.controls.description.value.length }}/1000</mat-hint>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="album-dialog-actions">
  <button mat-button mat-dialog-close type="button">Cancel</button>
  <button mat-flat-button type="button" [disabled]="form.invalid" (click)="submit()">{{ data.confirmLabel }}</button>
</mat-dialog-actions>
