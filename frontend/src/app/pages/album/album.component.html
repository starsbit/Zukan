<zukan-layout>
  <section class="album-page__header">
    <button mat-flat-button color="primary" type="button" (click)="createAlbum()">
      Create album
    </button>
  </section>

  @if (loading() && !hasAlbums()) {
    <mat-card class="album-page__loading" appearance="outlined">
      <mat-spinner diameter="40"></mat-spinner>
      <span>Loading albums…</span>
    </mat-card>
  } @else if (isEmpty()) {
    <mat-card class="album-page__empty" appearance="outlined">
      <mat-card-header>
        <mat-card-title>No albums yet</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p>Albums you own or collaborators share with you will appear here.</p>
      </mat-card-content>
    </mat-card>
  } @else {
    <section class="album-page__grid">
      @for (album of albums(); track album.id) {
        <zukan-album-card
          [album]="album"
          [allowEdit]="canEdit(album)"
          [allowInvite]="canInvite(album)"
          [allowDelete]="canDelete(album)"
          (editRequested)="editAlbum($event)"
          (inviteRequested)="inviteToAlbum($event)"
          (deleteRequested)="deleteAlbum($event)">
        </zukan-album-card>
      }
    </section>
  }
</zukan-layout>
