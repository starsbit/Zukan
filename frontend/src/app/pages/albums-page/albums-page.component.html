<section class="albums-layout">
  <app-sidebar />

  <section class="albums-shell">
    <header class="albums-header">
      <div>
        <p class="eyebrow">Collections</p>
        <h1>Albums</h1>
        <p class="subtitle">Group favorite images into named sets you can revisit later.</p>
      </div>

      <button mat-flat-button type="button" class="create-button" (click)="createAlbum()">
        <mat-icon>add</mat-icon>
        <span>Create album</span>
      </button>
    </header>

    @let albums = (albums$ | async) ?? [];
    @let loading = (loading$ | async);
    @let error = (error$ | async);

    <app-list-state
      containerClass="albums-state"
      [loading]="!!loading"
      [hasError]="!!error"
      [itemCount]="albums.length"
      loadingMessage="Loading albums..."
      errorMessage="We could not load your albums right now."
      emptyMessage="No albums yet. Create one to start grouping images."
      emptyIcon="collections_bookmark"
      (retryRequested)="reload()"
    >
      <section class="albums-grid">
        @for (album of albums; track album.id) {
          <app-album-card [album]="album" />
        }
      </section>
    </app-list-state>
  </section>
</section>
