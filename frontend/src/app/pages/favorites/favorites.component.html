<zukan-layout>
  <zukan-media-browser
    [showStories]="true"
    [storyParams]="storyParams()"
    [dayGroups]="galleryStore.groupedByDay()"
    [timeline]="galleryStore.timeline()"
    [loading]="galleryStore.loading()"
    [allowSelection]="false"
    [showPublicBadge]="false"
    [emptyStateTitle]="'No favorites yet'"
    [emptyStateMessage]="'Media you favorite will appear here.'">
  </zukan-media-browser>
</zukan-layout>
