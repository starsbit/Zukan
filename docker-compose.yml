services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zukan
      POSTGRES_PASSWORD: zukan
      POSTGRES_DB: zukan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zukan"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://zukan:zukan@db:5432/zukan
      LOG_LEVEL: INFO
    volumes:
      - storage_data:/backend/storage
      - model_cache:/backend/model_cache
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  shiori:
    profiles: ["shiori"]
    build:
      context: .
      dockerfile: shiori/Dockerfile
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      ZUKAN_BASE_URL: http://api:8000
      STATE_DB_PATH: /data/shiori.db
      SYNC_INTERVAL_SECONDS: 900
      DEFAULT_VISIBILITY: private
    volumes:
      - shiori_data:/data
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  storage_data:
  model_cache:
  shiori_data:
