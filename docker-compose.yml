services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zukan
      POSTGRES_PASSWORD: zukan
      POSTGRES_DB: zukan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zukan"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://zukan:zukan@db:5432/zukan
      LOG_LEVEL: INFO
    volumes:
      - storage_data:/backend/storage
      - model_cache:/backend/model_cache
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  storage_data:
  model_cache:
